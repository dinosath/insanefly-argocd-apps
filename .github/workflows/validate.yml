# ===========================================================================
# validate.yml — CI pipeline for InsaneFly ArgoCD Apps repo
#
# All tools managed by mise (helm, kubeconform). Runs on push/PR.
# Consolidates argocd-test.yaml functionality (yamllint, kubeconform with
# CRD schema validation, helm lint + template).
# ===========================================================================
name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: true
          experimental: true
      - name: YAML lint
        run: mise run yamllint

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: true
          experimental: true
      - name: Helm lint
        run: mise run helm-lint

  kubeconform:
    name: K8s schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: true
          experimental: true
      - name: Validate manifests (ArgoCD apps + Helm templates)
        run: mise run kubeconform

