apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-kv
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
          audiences:
            - vault
---
# Bootstrap secret for CNPG cluster — must exist in the postgres namespace
# so CloudNativePG can set the 'ferriskey' owner password during initdb
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ferriskey-db-secret
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: ferriskey-db-secret
    creationPolicy: Owner
    template:
      data:
        username: ferriskey
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: ferriskey/db
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ferriskey-admin
  namespace: ferriskey
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: ferriskey-admin
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: ferriskey/admin
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ferriskey-db-credentials
  namespace: ferriskey
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: ferriskey-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: ferriskey/db
        property: password
