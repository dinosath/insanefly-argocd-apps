database:
  host: "postgres.database.svc.cluster.local"
  port: 5432
  name: "ferriskey"
  user: "ferriskey"
  passwordSecret:
    name: "ferriskey-db-credentials"
    key: "password"

common:
  env:
    - name: ADMIN_USERNAME
      value: "admin"
    - name: ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: ferriskey-admin
          key: password
    - name: ADMIN_EMAIL
      value: "admin@yourorg.com"
    - name: ALLOWED_ORIGINS
      value: "https://iam.yourorg.com"
