apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pgadmin-credentials
  namespace: pgadmin
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: pgadmin-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: pgadmin/credentials
        property: password
