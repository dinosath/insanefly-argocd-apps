server:
  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address     = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/vault/data"
        }

        service_registration "kubernetes" {}

  readinessProbe:
    enabled: true
    path: '/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204'

  dataStorage:
    enabled: true
    size: 10Gi

  auditStorage:
    enabled: true
    size: 10Gi

  ingress:
    enabled: true
    activeService: true
    hosts:
      - host: vault.insanefly.com
        paths:
          - /
    pathType: Prefix

ui:
  enabled: true

injector:
  enabled: true
