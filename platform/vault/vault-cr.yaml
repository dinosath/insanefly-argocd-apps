apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: leader-election-role
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: leader-election-rolebinding
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: leader-election-role
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: vault
---
apiVersion: vault.banzaicloud.com/v1alpha1
kind: Vault
metadata:
  name: vault
  namespace: vault
spec:
  size: 3
  image: hashicorp/vault:2.0.1

  serviceAccount: vault
  serviceType: ClusterIP

  ingress:
    spec:
      rules:
        - host: vault.insanefly.com
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: vault
                    port:
                      number: 8200

  volumeClaimTemplates:
    - metadata:
        name: vault-raft
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi

  volumeMounts:
    - name: vault-raft
      mountPath: /vault/file

  unsealConfig:
    options:
      secretShares: 5
      secretThreshold: 3
    kubernetes:
      secretNamespace: vault

  config:
    disable_mlock: true
    storage:
      raft:
        path: /vault/file
    listener:
      tcp:
        address: "0.0.0.0:8200"
        tls_disable: "true"
    api_addr: "http://vault.vault.svc.cluster.local:8200"
    cluster_addr: "http://${.Env.POD_NAME}.vault-internal.vault.svc.cluster.local:8201"
    ui: true

  serviceRegistrationEnabled: true

  externalConfig:
    policies:
      - name: external-secrets
        rules: |
          path "secret/data/ferriskey/*" {
            capabilities = ["read"]
          }
          path "secret/metadata/ferriskey/*" {
            capabilities = ["list"]
          }

    auth:
      - type: kubernetes
        roles:
          - name: external-secrets
            bound_service_account_names: ["external-secrets"]
            bound_service_account_namespaces: ["external-secrets"]
            policies: external-secrets
            audience: vault
            ttl: 1h

    secrets:
      - path: secret
        type: kv
        description: General secrets (KV-v2)
        options:
          version: 2
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-seeder
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-seeder
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["vault-unseal-keys"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-seeder
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-seeder
subjects:
  - kind: ServiceAccount
    name: vault-seeder
    namespace: vault
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-seed-ferriskey
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: vault-seeder
      restartPolicy: OnFailure
      containers:
        - name: seeder
          image: hashicorp/vault:1.19
          env:
            - name: VAULT_ADDR
              value: http://vault.vault.svc.cluster.local:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-unseal-keys
                  key: vault-root
          command:
            - /bin/sh
            - -c
            - |
              set -e

              seed() {
                PATH_="$1"
                if vault kv get "$PATH_" >/dev/null 2>&1; then
                  echo "$PATH_ already exists, skipping."
                else
                  PASSWORD=$(dd if=/dev/urandom bs=1 count=24 2>/dev/null | base64 | tr -d '\n=/')
                  vault kv put "$PATH_" password="$PASSWORD"
                  echo "Created $PATH_"
                fi
              }

              seed secret/ferriskey/admin
              seed secret/ferriskey/db
              echo "Done."
