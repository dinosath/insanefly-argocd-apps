apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-init
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-init
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-init
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-init
subjects:
  - kind: ServiceAccount
    name: vault-init
    namespace: vault
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: vault-init
      restartPolicy: OnFailure
      initContainers:
        - name: init-vault-0
          image: ghcr.io/bank-vaults/bank-vaults:latest
          args:
            - unseal
            - --init
            - --once
            - --mode=k8s
            - --k8s-secret=vault-unseal-keys
            - --k8s-namespace=vault
          env:
            - name: VAULT_ADDR
              value: http://vault-0.vault-internal.vault.svc.cluster.local:8200
        - name: unseal-vault-1
          image: ghcr.io/bank-vaults/bank-vaults:latest
          args:
            - unseal
            - --once
            - --mode=k8s
            - --k8s-secret=vault-unseal-keys
            - --k8s-namespace=vault
          env:
            - name: VAULT_ADDR
              value: http://vault-1.vault-internal.vault.svc.cluster.local:8200
        - name: unseal-vault-2
          image: ghcr.io/bank-vaults/bank-vaults:latest
          args:
            - unseal
            - --once
            - --mode=k8s
            - --k8s-secret=vault-unseal-keys
            - --k8s-namespace=vault
          env:
            - name: VAULT_ADDR
              value: http://vault-2.vault-internal.vault.svc.cluster.local:8200
      containers:
        - name: done
          image: alpine:3.20
          command: ["/bin/sh", "-c", "echo 'Vault initialized and all pods unsealed.'"]
