# ===========================================================================
# external-secrets — values.yaml
#
# ClusterSecretStore + ExternalSecrets that read credentials from Vault.
# Vault must be running and seeded before this chart is applied.
# ===========================================================================

# ---------------------------------------------------------------------------
# ClusterSecretStore + ExternalSecrets — Ferriskey
# ---------------------------------------------------------------------------
ferriskeySecrets:
  enabled: true
  clusterSecretStoreName: vault-kv
  postgresNamespace: postgres
  ferriskeyNamespace: ferriskey

# ---------------------------------------------------------------------------
# ExternalSecrets — pgAdmin
# ---------------------------------------------------------------------------
pgadminSecrets:
  enabled: true
  namespace: pgadmin
  clusterSecretStoreName: vault-kv

# ---------------------------------------------------------------------------
# ExternalSecrets — ClickHouse
# ---------------------------------------------------------------------------
clickhouseSecrets:
  enabled: true
  namespace: clickhouse
  clusterSecretStoreName: vault-kv

# ---------------------------------------------------------------------------
# ExternalSecrets — Vector (shares clickhouse secret)
# ---------------------------------------------------------------------------
vectorSecrets:
  enabled: true
  namespace: vector
  clusterSecretStoreName: vault-kv

# ---------------------------------------------------------------------------
# ExternalSecrets — Coder
# ---------------------------------------------------------------------------
coderSecrets:
  enabled: true
  postgresNamespace: postgres
  coderNamespace: coder
  clusterSecretStoreName: vault-kv
  dbSecretName: coder-db-secret
  dbUrlSecretName: coder-db-url
  database: coder
  username: coder
  host: postgres-cluster-rw.postgres.svc.cluster.local
