{{- with .Values.ferriskeyDbSecret }}
{{- if .enabled }}
---
# Password for the ferriskey managed role in CNPG
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .secretName }}
  namespace: {{ .namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "external-secrets.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .secretName }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: ferriskey
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: ferriskey/db
        property: password
{{- end }}
{{- end }}

