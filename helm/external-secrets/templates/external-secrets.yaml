{{- with .Values.coderSecrets }}
{{- if .enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: {{ .dbSecretName }}
  namespace: {{ .postgresNamespace }}
  labels:
    {{- include "external-secrets.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .dbSecretName }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: {{ .username }}
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: coder/db
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: {{ .dbUrlSecretName }}
  namespace: {{ .coderNamespace }}
  labels:
    {{- include "external-secrets.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .dbUrlSecretName }}
    creationPolicy: Owner
    template:
      data:
        url: postgres://{{ .username }}:{{ `{{ .password }}` }}@{{ .host }}:5432/{{ .database }}?sslmode=disable
  data:
    - secretKey: password
      remoteRef:
        key: coder/db
        property: password
{{- end }}
{{- end }}
