{{- with .Values.ferriskeySecrets }}
{{- if .enabled }}
---
# ClusterSecretStore — shared by all ExternalSecrets in this cluster
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .clusterSecretStoreName }}
  labels:
    {{- include "external-secrets.labels" $ | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ .vaultServer | quote }}
      path: {{ .vaultPath | quote }}
      version: "v2"
      caProvider:
        type: Secret
        name: vault-tls
        namespace: vault
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: {{ .externalSecretsNamespace | quote }}
            audiences:
              - vault
---
# Bootstrap secret: lets CNPG set the ferriskey owner password during initdb
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ferriskey-db-secret
  namespace: {{ .postgresNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "external-secrets.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: ferriskey-db-secret
    creationPolicy: Owner
    template:
      data:
        username: ferriskey
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: ferriskey/db
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ferriskey-admin
  namespace: {{ .ferriskeyNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "external-secrets.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: ferriskey-admin
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: ferriskey/admin
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: ferriskey-db-credentials
  namespace: {{ .ferriskeyNamespace }}
  labels:
    {{- include "external-secrets.labels" $ | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: {{ .clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: ferriskey-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: ferriskey/db
        property: password
{{- end }}
{{- end }}

