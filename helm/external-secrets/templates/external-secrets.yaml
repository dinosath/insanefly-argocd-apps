{{- with .Values.ferriskeySecrets }}
{{- if .enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ferriskey-admin
  namespace: {{ .ferriskeyNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "external-secrets.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: ferriskey-admin
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: ferriskey/admin
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: ferriskey-db-credentials
  namespace: {{ .ferriskeyNamespace }}
  labels:
    {{- include "external-secrets.labels" $ | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: {{ .clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: ferriskey-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: ferriskey/db
        property: password
{{- end }}
{{- end }}

{{- with .Values.vectorSecrets }}
{{- if .enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: clickhouse
  namespace: {{ .namespace }}
  labels:
    {{- include "external-secrets.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: clickhouse
    creationPolicy: Owner
    template:
      data:
        admin-password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: clickhouse/credentials
        property: password
{{- end }}
{{- end }}

