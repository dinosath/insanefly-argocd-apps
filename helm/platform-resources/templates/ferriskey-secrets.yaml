{{- with .Values.ferriskeyDatabase }}
{{- if .enabled }}
{{- $password := (randAlphaNum 32) -}}
---
# Password for the CNPG managed role "ferriskey" in the postgres Cluster.
# CNPG will detect this secret and set the role password accordingly.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .passwordSecretName }}
  namespace: {{ $.Values.postgresCluster.namespace }}
  labels:
    cnpg.io/reload: "true"
    {{- include "insanefly-platform.labels" $ | nindent 4 }}
type: kubernetes.io/basic-auth
data:
  username: {{ "ferriskey" | b64enc }}
  password: {{ $password | b64enc }}
---
# Password used by the FerrisKey app to connect to the database.
# Must match the CNPG managed role password above.
apiVersion: v1
kind: Secret
metadata:
  name: ferriskey-db-credentials
  namespace: {{ .ferriskeyNamespace }}
  labels:
    {{- include "insanefly-platform.labels" $ | nindent 4 }}
type: Opaque
data:
  password: {{ $password | b64enc }}
{{- end }}
{{- end }}
