{{- with .Values.postgresCluster }}
{{- if .enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .clusterName }}
  namespace: {{ .namespace }}
  labels:
    {{- include "insanefly-platform.labels" $ | nindent 4 }}
spec:
  instances: {{ .instances }}
{{- with $.Values.coderDatabase }}
{{- if .enabled }}
  managed:
    roles:
      - name: {{ .roleName }}
        ensure: present
        login: true
        passwordSecret:
          name: {{ .passwordSecretName }}
{{- end }}
{{- end }}
  bootstrap:
    initdb:
      database: {{ .bootstrap.database }}
      owner: {{ .bootstrap.owner }}
      secret:
        name: {{ .bootstrap.secretName }}
  storage:
    size: {{ .storage.size }}
{{- end }}
{{- end }}

{{- with .Values.coderDatabase }}
{{- if .enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: {{ .databaseName }}
  namespace: {{ .namespace }}
  labels:
    {{- include "insanefly-platform.labels" $ | nindent 4 }}
spec:
  cluster:
    name: {{ .clusterName }}
  name: {{ .databaseName }}
  owner: {{ .roleName }}
  ensure: present
{{- end }}
{{- end }}
