{{- with .Values.ferriskeyDatabase }}
{{- if .enabled }}
{{- $password := (randAlphaNum 32) -}}
---
# Password for the CNPG managed role "ferriskey" in the postgres Cluster.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .passwordSecretName }}
  namespace: {{ $.Values.postgresCluster.namespace }}
  labels:
    cnpg.io/reload: "true"
    {{- include "insanefly-platform.labels" $ | nindent 4 }}
type: kubernetes.io/basic-auth
data:
  username: {{ "ferriskey" | b64enc }}
  password: {{ $password | b64enc }}
---
# Password used by the FerrisKey app to connect to the database.
apiVersion: v1
kind: Secret
metadata:
  name: ferriskey-db-credentials
  namespace: {{ .ferriskeyNamespace }}
  labels:
    {{- include "insanefly-platform.labels" $ | nindent 4 }}
type: Opaque
data:
  password: {{ $password | b64enc }}
{{- end }}
{{- end }}

{{- with .Values.coderDatabase }}
{{- if .enabled }}
{{- $password := (randAlphaNum 32) -}}
---
# Password for the CNPG managed role "coder" in the postgres Cluster.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .passwordSecretName }}
  namespace: {{ $.Values.postgresCluster.namespace }}
  labels:
    cnpg.io/reload: "true"
    {{- include "insanefly-platform.labels" $ | nindent 4 }}
type: kubernetes.io/basic-auth
data:
  username: {{ .roleName | b64enc }}
  password: {{ $password | b64enc }}
---
# Connection URL used by the Coder app to connect to the database.
apiVersion: v1
kind: Secret
metadata:
  name: coder-db-url
  namespace: {{ .coderNamespace }}
  labels:
    {{- include "insanefly-platform.labels" $ | nindent 4 }}
type: Opaque
data:
  url: {{ printf "postgres://%s:%s@%s-rw.%s.svc.cluster.local:5432/%s?sslmode=disable" .roleName $password .clusterName $.Values.postgresCluster.namespace .databaseName | b64enc }}
{{- end }}
{{- end }}

{{- with .Values.clickhouseCredentials }}
{{- if .enabled }}
{{- $password := (randAlphaNum 24) -}}
---
# Admin password used by the ClickHouse app.
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse
  namespace: {{ .namespace }}
  labels:
    {{- include "insanefly-platform.labels" $ | nindent 4 }}
type: Opaque
data:
  admin-password: {{ $password | b64enc }}
---
# Admin password used by Vector to connect to ClickHouse.
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse
  namespace: {{ .vectorNamespace }}
  labels:
    {{- include "insanefly-platform.labels" $ | nindent 4 }}
type: Opaque
data:
  admin-password: {{ $password | b64enc }}
{{- end }}
{{- end }}
