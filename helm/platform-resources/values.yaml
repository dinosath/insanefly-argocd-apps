# ===========================================================================
# platform-resources — values.yaml
#
# This chart renders ONLY the raw Kubernetes resources that are not upstream
# Helm charts. Upstream charts (CNPG, KEDA, Vault operator, Prometheus,
# external-secrets, OTel, pgAdmin, Ferriskey) are installed via separate
# ArgoCD Application resources.
#
# Namespace overrides were historically used with helmfile environments;
# they are now hardcoded inline in the ArgoCD Application YAMLs.
# ===========================================================================

# ---------------------------------------------------------------------------
# Namespace creation
# Operator/app namespaces are managed by ArgoCD sync policy
# (CreateNamespace=true). Toggle any of these if you manage them elsewhere.
# ---------------------------------------------------------------------------
namespaces:
  postgres:
    enabled: true
    name: postgres
  coder:
    enabled: true
    name: coder

# ---------------------------------------------------------------------------
# CloudNativePG cluster  (raw CNPG Cluster CR)
# ---------------------------------------------------------------------------
postgresCluster:
  enabled: true
  namespace: postgres
  clusterName: postgres-cluster
  instances: 3
  storage:
    size: 1Gi
  bootstrap:
    database: app
    owner: app

# ---------------------------------------------------------------------------
# Managed roles + Databases
# ---------------------------------------------------------------------------
ferriskeyDatabase:
  enabled: true
  namespace: postgres
  ferriskeyNamespace: ferriskey
  clusterName: postgres-cluster
  roleName: ferriskey
  passwordSecretName: ferriskey-db-secret
  databaseName: ferriskey

# ---------------------------------------------------------------------------
# pgAdmin admin credentials
# ---------------------------------------------------------------------------
pgadminCredentials:
  enabled: true
  namespace: pgadmin

# ---------------------------------------------------------------------------
# FerrisKey API admin password
# ---------------------------------------------------------------------------
ferriskeyAdmin:
  enabled: true
  ferriskeyNamespace: ferriskey

# ---------------------------------------------------------------------------
# CNPG Database — Coder
# ---------------------------------------------------------------------------
coderDatabase:
  enabled: true
  namespace: postgres
  coderNamespace: coder
  clusterName: postgres-cluster
  roleName: coder
  passwordSecretName: coder-db-secret
  databaseName: coder

# ---------------------------------------------------------------------------
# Auto-generated ClickHouse credentials (admin password)
# ---------------------------------------------------------------------------
clickhouseCredentials:
  enabled: true
  namespace: clickhouse
  vectorNamespace: vector
