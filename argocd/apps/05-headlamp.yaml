apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/headlamp/
    targetRevision: 0.43.0
    chart: headlamp
    helm:
      releaseName: headlamp
      values: |
        ingress:
          enabled: true
          ingressClassName: "traefik"
          hosts:
            - host: headlamp.insanefly.com
              paths:
                - path: /
                  type: Prefix
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
