apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://helm.vector.dev
    targetRevision: 0.56.0
    chart: vector
    helm:
      releaseName: vector
      values: |
        role: Agent
        customConfig:
          data_dir: /vector-data-dir
          api:
            enabled: true
            address: 127.0.0.1:8686
          sources:
            kubernetes_logs:
              type: kubernetes_logs
          transforms:
            to_clickhouse:
              type: remap
              inputs:
                - kubernetes_logs
              source: |
                .message = to_string(.message) ?? ""
                .host = to_string(.kubernetes.pod_node_name) ?? ""
                .namespace = to_string(.kubernetes.pod_namespace) ?? ""
                .pod = to_string(.kubernetes.pod_name) ?? ""
                .container = to_string(.kubernetes.container_name) ?? ""
                .source_type = to_string(.source_type) ?? "kubernetes_logs"
                .raw = encode_json(.)
          sinks:
            clickhouse:
              type: clickhouse
              inputs:
                - to_clickhouse
              endpoint: http://vector:${CLICKHOUSE_PASSWORD}@clickhouse.clickhouse.svc.cluster.local:8123
              database: vector
              table: logs
              compression: gzip
              skip_unknown_fields: true
        env:
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: clickhouse
                key: admin-password
  destination:
    server: https://kubernetes.default.svc
    namespace: vector
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
