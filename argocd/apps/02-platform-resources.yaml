apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/dinosath/insanefly-argocd-apps
    targetRevision: main
    path: helm/platform-resources
    helm:
      releaseName: platform-resources
      values: |
        namespaces:
          postgres:
            enabled: true
            name: postgres
          vault:
            enabled: true
            name: vault
          pgadmin:
            enabled: true
            name: pgadmin
          coder:
            enabled: true
            name: coder
          ferriskey:
            enabled: true
            name: ferriskey
        postgresCluster:
          namespace: postgres
        vault:
          namespace: vault
          size: 1
          externalConfig:
            policies:
              - name: external-secrets
                rules: |
                  path "secret/data/ferriskey/*" {
                    capabilities = ["read"]
                  }
                  path "secret/metadata/ferriskey/*" {
                    capabilities = ["list"]
                  }
                  path "secret/data/pgadmin/*" {
                    capabilities = ["read"]
                  }
                  path "secret/metadata/pgadmin/*" {
                    capabilities = ["list"]
                  }
                  path "secret/data/clickhouse/*" {
                    capabilities = ["read"]
                  }
                  path "secret/metadata/clickhouse/*" {
                    capabilities = ["list"]
                  }
                  path "secret/data/coder/*" {
                    capabilities = ["read"]
                  }
                  path "secret/metadata/coder/*" {
                    capabilities = ["list"]
                  }
            auth:
              - type: kubernetes
                roles:
                  - name: external-secrets
                    bound_service_account_names: ["external-secrets"]
                    bound_service_account_namespaces: ["external-secrets"]
                    policies: external-secrets
                    ttl: 1h
            secrets:
              - path: secret
                type: kv
                description: General secrets (KV-v2)
                options:
                  version: 2
        vaultSeed:
          enabled: true
          namespace: vault
          vaultAddr: https://vault.vault.svc.cluster.local:8200
          secrets:
            - secret/ferriskey/admin
            - secret/ferriskey/db
            - secret/pgadmin/credentials
            - secret/clickhouse/credentials
            - secret/coder/db
        vaultInit:
          enabled: false
          namespace: vault
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: ferriskey-db-secret
      namespace: postgres
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: ferriskey-db-credentials
      namespace: ferriskey
      jsonPointers:
        - /data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
