apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/dinosath/insanefly-argocd-apps
    targetRevision: main
    path: helm/platform-resources
    helm:
      releaseName: platform-resources
      values: |
        namespaces:
          postgres:
            enabled: true
            name: postgres
          pgadmin:
            enabled: true
            name: pgadmin
          coder:
            enabled: true
            name: coder
          ferriskey:
            enabled: true
            name: ferriskey
        postgresCluster:
          namespace: postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: ferriskey-db-secret
      namespace: postgres
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: ferriskey-db-credentials
      namespace: ferriskey
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: coder-db-secret
      namespace: postgres
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: coder-db-url
      namespace: coder
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: clickhouse
      namespace: clickhouse
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: clickhouse
      namespace: vector
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: pgadmin-credentials
      namespace: pgadmin
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: ferriskey-api-admin
      namespace: ferriskey
      jsonPointers:
        - /data
