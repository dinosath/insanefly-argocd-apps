apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ferriskey-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/dinosath/insanefly-argocd-apps
    targetRevision: main
    path: platform/auth
    directory:
      include: secret.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ferriskey
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
