apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ferriskey
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: ghcr.io/ferriskey/charts
    targetRevision: 0.7.1
    chart: ferriskey
    helm:
      releaseName: ferriskey
      values: |
        database:
          host: postgres-cluster-rw.postgres.svc.cluster.local
          port: 5432
          name: ferriskey
          user: ferriskey
          passwordSecret:
            create: false
            name: ferriskey-db-credentials
            key: password
        ingress:
          enabled: true
          class: traefik
        api:
          admin:
            username: admin
            email: admin@yourorg.com
            passwordSecret:
              create: false
              name: ferriskey-api-admin
              key: password
          server:
            allowedOrigins:
              - https://auth.insanefly.com
        publicHost: auth.insanefly.com
        postgresql:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ferriskey
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
