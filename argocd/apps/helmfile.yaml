apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: insanefly-helmfile
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dinosath/insanefly-argocd-apps
    targetRevision: main
    path: .
    plugin:
      name: helmfile
      env:
        - name: HELMFILE_ENVIRONMENT
          value: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true