apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coder
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://helm.coder.com/v2
    targetRevision: 2.34.0
    chart: coder
    helm:
      releaseName: coder
      values: |
        coder:
          ingress:
            enable: true
            className: "traefik"
            hosts:
              - host: coder.insanefly.com
                paths:
                  - path: /
                    pathType: Prefix
          env:
            - name: CODER_ACCESS_URL
              value: "https://coder.insanefly.com"
            - name: CODER_PG_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: coder-db-url
                  key: url
            - name: CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE
              value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: coder
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
