apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ferriskey
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  sources:
    - repoURL: ghcr.io/ferriskey/charts
      chart: ferriskey
      targetRevision: 0.6.1
      helm:
        releaseName: ferriskey
        valueFiles:
          - $values/platform/auth/value.yaml
    - repoURL: https://github.com/dinosath/insanefly-argocd-apps
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: ferriskey
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
